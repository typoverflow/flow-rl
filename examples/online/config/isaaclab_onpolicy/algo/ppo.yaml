# @package _global_

algo:
  name: ppo
  num_envs: 4096
  rollout_length: 24
  backbone_cls: mlp
  actor_hidden_dims: [256, 256, 256]
  critic_hidden_dims: [256, 256, 256]
  activation: elu
  actor_lr: 1.0e-4
  critic_lr: 1.0e-3
  init_noise_std: 1.0
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coeff: 0.005
  value_loss_coef: 1.0
  use_clipped_value_loss: true
  desired_kl: 0.01
  schedule: fixed
  normalize_advantage: true
  num_minibatches: 4
  num_epochs: 5
  max_grad_norm: 1.0
