# @package _global_

algo:
  name: fpopp
  num_envs: 1024
  rollout_length: 24
  backbone_cls: mlp
  critic_hidden_dims: [256, 256, 256]
  critic_activation: elu
  critic_lr: 0.001
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.05
  reward_scaling: 1.0
  normalize_advantage: true
  num_minibatches: 4
  num_epochs: 4
  batch_size: 6144
  clip_grad_norm: 1.0
  additive_noise: 0.1
  num_mc_samples: 16
  cfm_loss_clamp: -1.0
  cfm_loss_clamp_negative_advantages_max: 20.0
  cfm_diff_clamp_max: 5.0
  advantage_clamp: 100.0
  flow:
    activation: silu
    hidden_dims: [256, 256, 256]
    time_dim: 16
    steps: 64
    clip_sampler: true
    lr: 0.0001
    x_min: -1.0
    x_max: 1.0
    output_scale: 1.0

train_frames: 100_000_000
