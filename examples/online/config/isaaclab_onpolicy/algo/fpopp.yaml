# @package _global_

algo:
  name: fpopp
  num_envs: 4096
  rollout_length: 24
  backbone_cls: mlp
  critic_hidden_dims: [512, 512, 512]
  critic_activation: elu
  critic_lr: 0.0001
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.05
  reward_scaling: 1.0
  normalize_advantage: true
  num_minibatches: 4
  num_epochs: ${oc.select:algo.num_epochs_dict.${task}, 16}
  clip_grad_norm: 1.0
  additive_noise: 0.02
  num_mc_samples: ${oc.select:algo.num_mc_samples_dict.${task}, 16}
  cfm_loss_reduction: sqrt
  cfm_loss_t_inverse_cdf_beta: 1.0
  cfm_loss_clamp: 20.0
  cfm_loss_clamp_negative_advantages_max: 20.0
  cfm_diff_clamp_max: 10.0
  advantage_clamp: 100.0
  value_loss_coef: 1.0
  use_clipped_value_loss: false
  action_clip: 2.0
  ema_decay: 0.95
  ema_warmup_steps: 500
  flow:
    activation: elu
    hidden_dims: [256, 256, 256]
    time_dim: 16
    steps: 64
    clip_sampler: false
    lr: 0.0001
    x_min: -1.0
    x_max: 1.0
  # Per-task overrides (humanoids use 32 samples / 32 epochs; quadrupeds fall through to 16).
  num_epochs_dict:
    Isaac-Humanoid-v0: 32
    Isaac-Velocity-Flat-G1-v0: 32
    Isaac-Velocity-Rough-G1-v0: 32
  num_mc_samples_dict:
    Isaac-Humanoid-v0: 32
    Isaac-Velocity-Flat-G1-v0: 32
    Isaac-Velocity-Rough-G1-v0: 32
