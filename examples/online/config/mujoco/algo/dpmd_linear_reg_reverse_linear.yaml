# @package _global_

algo:
  name: dpmd_linear_reg_reverse_linear
  backbone_cls: mlp
  critic_hidden_dims: [256, 256]
  critic_activation: relu
  critic_lr: 0.0003
  temp_lr: 0.0003
  discount: 0.99
  num_samples: 10
  num_behavior_samples: 1
  num_particles: 64
  target_kl: 2.0
  reweight: linear
  ema: 0.005
  old_policy_update_interval: 1000
  additive_noise_init: 0.2
  additive_noise_end: 0.2
  additive_noise_decay_steps: 1000000
  negative_bound: 0.0
  weights_offset: 0.0
  weights_offset_decay_rate: 0.0
  weights_offset_schedule: reverse_linear
  neg_weight_reg: 0.0
  diffusion:
    backbone_cls: ${algo.backbone_cls}
    activation: mish
    time_dim: 64
    hidden_dims: [256, 256, 256]
    lr: 0.0001
    end_lr: null
    lr_decay_steps: null
    lr_decay_begin: null
    steps: 20
    clip_sampler: true
    x_min: -1.0
    x_max: 1.0
    solver: ddpm
